<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Repos · nmarchand73</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --green: #3fb950;
      --orange: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-weight: 600;
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: var(--text-muted); font-weight: 300; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .sort-select {
      padding: 0.6rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      min-width: 180px;
      cursor: pointer;
    }
    .repo-count {
      align-self: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card:hover {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }
    .card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    .card-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 1.05rem;
    }
    .card-title a {
      color: var(--accent);
      text-decoration: none;
    }
    .card-title a:hover { text-decoration: underline; }
    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .card-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.5rem 1rem;
      padding: 0.6rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .card-stat {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .card-stat-label {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .card-stat-value {
      color: var(--text);
      font-weight: 500;
    }
    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .category-section {
      margin-bottom: 2.5rem;
    }
    .category-title {
      font-weight: 600;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .category-badge {
      background: var(--accent-dim);
      color: var(--bg);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .badge-fork { background: rgba(210, 153, 34, 0.25); color: var(--orange); }
    .badge-private { background: rgba(139, 148, 158, 0.3); color: var(--text-muted); }
    .badge-lang { background: rgba(63, 185, 80, 0.2); color: var(--green); }
    .badge-stars { background: rgba(210, 153, 34, 0.15); color: var(--orange); }
    .auth-section {
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .auth-section summary {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .auth-section summary:hover { color: var(--accent); }
    .auth-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.75rem;
    }
    .auth-row input[type="password"] {
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      min-width: 200px;
    }
    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .card-links a {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      background: rgba(88, 166, 255, 0.1);
      border-radius: 4px;
    }
    .card-links a:hover {
      background: rgba(88, 166, 255, 0.2);
      text-decoration: none;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
    }
    .refresh-btn {
      padding: 0.5rem 1rem;
      background: var(--accent-dim);
      border: none;
      border-radius: 6px;
      color: white;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .refresh-btn:hover { filter: brightness(1.1); }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>GitHub Repos · nmarchand73</h1>
      <p class="subtitle" id="subtitle">37 repos · Links, dates, key info</p>
    </header>
    <details class="auth-section">
      <summary>Include private repos (GitHub token)</summary>
      <p class="subtitle" style="margin: 0.5rem 0 0 0; font-size: 0.8rem;">Token with <code>repo</code> scope. Stored locally, never sent elsewhere.</p>
      <div class="auth-row">
        <input type="password" id="gh-token" placeholder="ghp_xxxx..." autocomplete="off" />
        <button type="button" id="auth-btn" class="refresh-btn">Load with token</button>
        <label style="font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.25rem;">
          <input type="checkbox" id="auth-remember" /> Remember
        </label>
        <button type="button" id="auth-clear" class="refresh-btn" style="background: transparent; border: 1px solid var(--border); display: none;">Disconnect</button>
      </div>
    </details>
    <div class="controls">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search by name, description, language..." autofocus />
      </div>
      <select id="filter-language" class="sort-select" title="Filter by language">
        <option value="">All languages</option>
      </select>
      <select id="filter-visibility" class="sort-select" title="Filter by visibility">
        <option value="">All</option>
        <option value="public">Public only</option>
        <option value="private">Private only</option>
      </select>
      <select id="filter-haspage" class="sort-select" title="Filter by published page">
        <option value="">All</option>
        <option value="yes">With live page</option>
      </select>
      <select id="filter-fork" class="sort-select" title="Filter by fork status">
        <option value="">All</option>
        <option value="own">Own repos only</option>
        <option value="fork">Forks only</option>
      </select>
      <select id="sort" class="sort-select">
        <option value="created-desc">Newest</option>
        <option value="created-asc">Oldest</option>
        <option value="updated-desc">Last commit</option>
        <option value="commits-desc">Commits ↓</option>
        <option value="name-asc">Name A→Z</option>
        <option value="name-desc">Name Z→A</option>
        <option value="stars-desc">Stars</option>
      </select>
      <span class="repo-count" id="count">—</span>
    </div>
    <div id="content"></div>
  </div>
  <script>
    const GITHUB_USER = 'nmarchand73';
    const TOKEN_KEY = 'gh_repos_toc_token';

    const REPO_DESCRIPTIONS = {
      'repositories_toc': 'Web page listing GitHub repos with links, dates, search, and category sort.',
      'ad_generator': 'Automated ad generator.',
      'Balance-of-Power': 'Web adaptation of Chris Crawford\'s Cold War geopolitical strategy game (USA vs USSR).',
      'bk_light': 'Python suite for BK-Light RGB LED matrices over BLE: clocks, animations, visual effects.',
      'business_simulator': 'Interactive business simulator to test economic models.',
      'colorizer': 'Web app for colorizing B&W images and videos using DeOldify ONNX models.',
      'cursor-course': 'Udemy course: Vibe Code full-stack apps with Cursor, MCP, NextJS, Supabase.',
      'dataengineering': 'Data engineering projects portfolio (pipelines, ETL).',
      'datascience': 'Data science side projects.',
      'dbt-fundamentals': 'Starter dbt project with dbt run and dbt test commands.',
      'Deep-Live-Cam': 'Real-time face swap and video deepfake with a single image.',
      'find-your-next-adventure': 'Python tool to extract adventure destinations from PDF travel guides to JSON.',
      'lachasseautresor': 'AI adventure book generator inspired by 1980s French TV show La Chasse au Trésor.',
      'Les-Yeux-de-Mona': 'Web app showcasing artworks from Les Yeux de Mona (Louvre, Orsay, Beaubourg).',
      'libriscribe': 'AI-powered book writing assistant from concept to manuscript.',
      'mp3tomidi': 'Convert piano recordings to MIDI with hand separation and chord analysis.',
      'MuseVision': 'Digital music score reader with traditional notation and piano roll simultaneously.',
      'neuromancer-text': 'Text adventure reimagining the 1988 Interplay cyberpunk RPG and Gibson\'s novel. Explore Chiba City, jack into the matrix, reach one of four endings. Rich terminal UI, English/Français.',
      'newsletter': 'Claude Code sub-agent system for researching, writing, and publishing newsletters.',
      'new_tempsx': 'AI generates Temps X-style episodes (1980s French sci-fi TV) for modern topics.',
      'nvidia': 'Interactive web app visualizing NVIDIA supply chain with stock trends and filters.',
      'nvidia-supplychain-analysis-MCP': 'MCP server for Nvidia supply chain analysis (health, technical, earnings).',
      'opening_trainer': 'Web app for mastering chess openings (Stonewall, Torre, Colle) with AI and Stockfish.',
      'producthunter': 'CLI tool scraping ProductHunt daily with Claude AI company insights for entrepreneurs.',
      'productmaker': 'Product creation and validation tool.',
      'RAG_2025': 'RAG app with hybrid search and cross-encoder re-ranking for French content.',
      'reddit-startup-idea-miner': 'Mines Reddit for startup ideas with AI analysis and pain score framework.',
      'RoleAndPlay': 'Complete RPG with AI Game Master for Pangaea universe (5 races, 5 classes).',
      'skills-build-applications-w-copilot-agent-mode': 'Build full-stack app with GitHub Copilot agent mode in under an hour.',
      'skills_sandbox': 'Sandbox for Claude / Cursor Skills.',
      'threadtracker': 'Firefox extension for tracking and managing email threads in Outlook Web.',
      'twilightzone': 'Interactive surreal display for classic Twilight Zone episodes (1959-1964).',
      'uap_disclosure_game': 'Board game: 2-6 players race for Full Disclosure via UAP trivia and investigation.',
      'uap_timeline': 'Bilingual (FR/EN) Astro site exploring 81 years of UAP events (1945–2026) through timeline, documents, documentary, people, incidents, DIRD reports.',
      'website': 'Flutter\'s website — contributions welcome (Jekyll, Dart, Firebase).',
      'yc_analyzer': 'Scrape YC companies and get AI insights for founders, investors, researchers.',
      'you_are_the_hero': 'Web gamebook reader converting EPUB choose-your-own-adventure books to interactive stories.'
    };
    let repos = [];
    let ghToken = localStorage.getItem(TOKEN_KEY) || '';

    let fetchError = null;

    function getCategoriesOrder(repoList) {
      const langCounts = {};
      for (const r of repoList) {
        const lang = r.language || 'No language';
        langCounts[lang] = (langCounts[lang] || 0) + 1;
      }
      return Object.entries(langCounts)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([lang]) => lang);
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function normalize(r) {
      const name = r.name;
      const desc = r.description || REPO_DESCRIPTIONS[name] || null;
      const category = r.language || 'No language';
      const hasPages = r.has_pages ?? false;
      const repoUrl = r.html_url || r.url;
      const owner = r.owner?.login || (repoUrl && repoUrl.match(/github\.com\/([^\/]+)\//)?.[1]) || GITHUB_USER;
      return {
        name,
        desc,
        category,
        url: repoUrl,
        readmeUrl: repoUrl + '#readme',
        owner,
        created: r.created_at || r.created,
        updated: r.pushed_at || r.updated_at || r.updated,
        language: r.language,
        stars: r.stargazers_count ?? r.stars ?? 0,
        topics: r.topics || [],
        fork: r.fork ?? false,
        private: r.private ?? false,
        hasPages,
        commits: r.commits ?? null
      };
    }

    function authHeaders() {
      const t = ghToken || document.getElementById('gh-token')?.value?.trim();
      if (!t) return {};
      return { 'Authorization': `Bearer ${t}` };
    }

    async function fetchCommitCounts() {
      const headers = { 'Content-Type': 'application/json', ...authHeaders() };
      const useViewer = !!headers['Authorization'];
      const query = useViewer
        ? `query { viewer { repositories(first: 100) { nodes { name defaultBranchRef { target { ... on Commit { history { totalCount } } } } } } } }`
        : `query { user(login: "${GITHUB_USER}") { repositories(first: 100) { nodes { name defaultBranchRef { target { ... on Commit { history { totalCount } } } } } } } }`;
      try {
        const res = await fetch('https://api.github.com/graphql', {
          method: 'POST',
          headers,
          body: JSON.stringify({ query })
        });
        if (!res.ok) return {};
        const json = await res.json();
        const root = useViewer ? json?.data?.viewer : json?.data?.user;
        const nodes = root?.repositories?.nodes ?? [];
        const map = {};
        for (const n of nodes) {
          const count = n?.defaultBranchRef?.target?.history?.totalCount ?? 0;
          map[n.name] = count;
        }
        return map;
      } catch (_) { return {}; }
    }

    async function fetchRepos() {
      const token = ghToken || document.getElementById('gh-token')?.value?.trim();
      const useAuth = !!token;
      const restUrl = useAuth
        ? 'https://api.github.com/user/repos?per_page=100&visibility=all'
        : `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100`;
      const headers = { ...authHeaders() };

      fetchError = null;
      try {
        const [restRes, commitMap] = await Promise.all([
          fetch(restUrl, { headers }),
          fetchCommitCounts()
        ]);
        if (!restRes.ok) throw new Error(restRes.status);
        const data = await restRes.json();
        const owner = data[0]?.owner?.login || GITHUB_USER;
        document.querySelector('h1').textContent = `GitHub Repos · ${owner}`;
        repos = data.map(r => {
          const norm = normalize(r);
          norm.commits = commitMap[r.name] ?? null;
          return norm;
        });
      } catch (err) {
        fetchError = err;
        repos = [];
      }
      render();
    }

    function filterAndSort() {
      const q = (document.getElementById('search').value || '').toLowerCase().trim();
      const sortVal = document.getElementById('sort').value;
      const filterLanguage = (document.getElementById('filter-language')?.value || '').trim();
      const filterVisibility = (document.getElementById('filter-visibility')?.value || '').trim();
      const filterHasPage = (document.getElementById('filter-haspage')?.value || '').trim();
      const filterFork = (document.getElementById('filter-fork')?.value || '').trim();

      let list = repos.filter(r => {
        if (q) {
          const haystack = [
            r.name,
            r.desc || '',
            r.category || '',
            r.language || '',
            r.private ? 'private' : '',
            ...(r.topics || [])
          ].join(' ').toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        if (filterLanguage && (r.language || 'No language') !== filterLanguage) return false;
        if (filterVisibility === 'public' && r.private) return false;
        if (filterVisibility === 'private' && !r.private) return false;
        if (filterHasPage === 'yes' && !r.hasPages) return false;
        if (filterFork === 'own' && r.fork) return false;
        if (filterFork === 'fork' && !r.fork) return false;
        return true;
      });

      const [field, dir] = sortVal.split('-');
      list.sort((a, b) => {
        let va, vb;
        if (field === 'created') {
          va = new Date(a.created || 0).getTime();
          vb = new Date(b.created || 0).getTime();
        } else if (field === 'updated') {
          va = new Date(a.updated || 0).getTime();
          vb = new Date(b.updated || 0).getTime();
        } else if (field === 'commits') {
          va = a.commits ?? -1;
          vb = b.commits ?? -1;
        } else if (field === 'name') {
          va = (a.name || '').toLowerCase();
          vb = (b.name || '').toLowerCase();
        } else if (field === 'stars') {
          va = a.stars ?? 0;
          vb = b.stars ?? 0;
        }
        if (dir === 'desc') [va, vb] = [vb, va];
        return va < vb ? -1 : va > vb ? 1 : 0;
      });

      const byCategory = {};
      for (const r of list) {
        const cat = r.category || 'No language';
        if (!byCategory[cat]) byCategory[cat] = [];
        byCategory[cat].push(r);
      }
      return byCategory;
    }

    function populateFilters() {
      const langSelect = document.getElementById('filter-language');
      const visSelect = document.getElementById('filter-visibility');
      if (!langSelect) return;

      const savedLang = langSelect.value;
      while (langSelect.options.length > 1) langSelect.remove(1);
      const langs = [...new Set(repos.map(r => r.language || 'No language'))].sort((a, b) => {
        if (a === 'No language') return 1;
        if (b === 'No language') return -1;
        return a.localeCompare(b);
      });
      for (const lang of langs) {
        const opt = document.createElement('option');
        opt.value = lang;
        opt.textContent = lang;
        langSelect.appendChild(opt);
      }
      if (savedLang && langSelect.querySelector(`option[value="${savedLang}"]`)) langSelect.value = savedLang;

      const hasPrivate = repos.some(r => r.private);
      if (visSelect) visSelect.style.display = hasPrivate ? '' : 'none';
    }

    function render() {
      if (repos.length > 0) populateFilters();
      const byCategory = filterAndSort();
      const content = document.getElementById('content');
      const total = Object.values(byCategory).reduce((s, arr) => s + arr.length, 0);
      document.getElementById('count').textContent = `${total} / ${repos.length}`;
      const publicCount = repos.filter(r => !r.private).length;
      const privateCount = repos.filter(r => r.private).length;
      const countStr = privateCount > 0
        ? `${repos.length} repos (${publicCount} public, ${privateCount} private)`
        : `${repos.length} repos`;
      document.getElementById('subtitle').textContent = `${countStr} · Links, dates, key info`;

      if (total === 0) {
        content.innerHTML = '<div class="empty-state">No repos match your search.</div>';
        return;
      }

      let html = '';
      const filteredList = Object.values(byCategory).flat();
      const catsToShow = getCategoriesOrder(filteredList).filter(c => byCategory[c] && byCategory[c].length > 0);
      for (const cat of catsToShow) {
        const list = byCategory[cat];
        html += `
          <section class="category-section">
            <h2 class="category-title">
              <span class="category-badge">${list.length}</span>${cat}
            </h2>
            <div class="grid">
              ${list.map(r => `
                <article class="card">
                  <div class="card-header">
                    <h3 class="card-title">
                      <a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
                    </h3>
                    ${(r.fork || r.private || r.language || r.stars > 0) ? `
                    <div class="card-badges">
                      ${r.private ? '<span class="badge badge-private">private</span>' : ''}
                      ${r.fork ? '<span class="badge badge-fork">fork</span>' : ''}
                      ${r.language ? `<span class="badge badge-lang">${r.language}</span>` : ''}
                      ${r.stars > 0 ? `<span class="badge badge-stars">⭐ ${r.stars}</span>` : ''}
                    </div>
                    ` : ''}
                  </div>
                  <div class="card-stats">
                    <div class="card-stat">
                      <span class="card-stat-label">Created</span>
                      <span class="card-stat-value">${formatDate(r.created)}</span>
                    </div>
                    <div class="card-stat">
                      <span class="card-stat-label">Last commit</span>
                      <span class="card-stat-value">${formatDate(r.updated)}</span>
                    </div>
                    ${r.commits != null ? `
                    <div class="card-stat">
                      <span class="card-stat-label">Commits</span>
                      <span class="card-stat-value">${r.commits}</span>
                    </div>
                    ` : ''}
                  </div>
                  <div class="card-links">
                    <a href="${r.readmeUrl}" target="_blank" rel="noopener">📄 README</a>
                    ${r.hasPages ? `<a href="https://${r.owner}.github.io/${r.name}/" target="_blank" rel="noopener">🌐 Live</a>` : ''}
                  </div>
                  <p class="card-desc">${r.desc || '—'}</p>
                </article>
              `).join('')}
            </div>
          </section>
        `;
      }
      content.innerHTML = html;
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);
    ['filter-language', 'filter-visibility', 'filter-haspage', 'filter-fork'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('change', render);
    });

    document.getElementById('auth-btn').addEventListener('click', () => {
      const input = document.getElementById('gh-token');
      const token = input?.value?.trim();
      if (!token) return;
      const remember = document.getElementById('auth-remember')?.checked;
      ghToken = token;
      if (remember) localStorage.setItem(TOKEN_KEY, token);
      else localStorage.removeItem(TOKEN_KEY);
      input.value = '';
      input.placeholder = 'Token active';
      document.getElementById('auth-clear').style.display = 'inline-block';
      const btn = document.getElementById('auth-btn');
      btn.disabled = true;
      btn.textContent = 'Loading…';
      fetchRepos().then(() => {
        btn.disabled = false;
        btn.textContent = 'Load with token';
      });
    });

    if (ghToken) {
      document.getElementById('gh-token').placeholder = 'Token active';
      document.getElementById('auth-clear').style.display = 'inline-block';
    }
    document.getElementById('auth-clear').addEventListener('click', () => {
      ghToken = '';
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('gh-token').placeholder = 'ghp_xxxx...';
      document.getElementById('auth-clear').style.display = 'none';
      document.querySelector('h1').textContent = 'GitHub Repos · ' + GITHUB_USER;
      fetchRepos();
    });
    fetchRepos();
  </script>
</body>
</html>
