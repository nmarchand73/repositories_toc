      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function inferDescFromName(name) {
      const human = name.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return human ? `${human} — projet` : null;
    }

    function normalize(r) {
      const name = r.name;
      const overrides = getOverrides()[name] || {};
      let desc;
      if (overrides.desc !== undefined) desc = overrides.desc || null;
      else desc = r.description || r.desc || REPO_DESCRIPTIONS[name] || inferDescFromName(name) || null;
      const category = overrides.category !== undefined ? overrides.category : (REPO_CATEGORY[name] || 'Divers');
      return {
        name,
        desc,
        category,
        url: r.html_url || r.url,
        created: r.created_at || r.created,
        updated: r.pushed_at || r.updated_at || r.updated,
        language: r.language,
        stars: r.stargazers_count ?? r.stars ?? 0,
        topics: r.topics || [],
        fork: r.fork ?? false,
        private: r.private ?? false
      };
    }

    const TOKEN_KEY = 'github_repos_token';
    const OVERRIDES_KEY = 'github_repos_overrides';

    function getOverrides() {
      try {
        const s = localStorage.getItem(OVERRIDES_KEY);
        return s ? JSON.parse(s) : {};
      } catch (_) { return {}; }
    }
    function setOverride(name, desc, category) {
      const o = getOverrides();
      if (desc !== undefined) o[name] = { ...(o[name] || {}), desc: desc || null };
      if (category !== undefined) o[name] = { ...(o[name] || {}), category: category || null };
      if (o[name] && !o[name].desc && !o[name].category) delete o[name];
      try { localStorage.setItem(OVERRIDES_KEY, JSON.stringify(o)); } catch (_) {}
    }

    function getStoredToken() {
      try {
        return localStorage.getItem(TOKEN_KEY) || '';
      } catch (_) { return ''; }
    }

    async function fetchRepos() {
      const token = getStoredToken().trim();
      const headers = { Accept: 'application/vnd.github.v3+json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;

      try {
        const url = token
          ? `https://api.github.com/user/repos?per_page=100&affiliation=owner,collaborator`
          : `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100`;
        const res = await fetch(url, { headers });
        if (!res.ok) {
          if (res.status === 401) console.warn('Token invalide ou expiré');
          throw new Error(res.status);
        }
        let data = await res.json();
        if (token) data = data.filter(r => r.owner?.login === GITHUB_USER);
        repos = data.map(normalize);
      } catch (_) {
        repos = FALLBACK_REPOS.map(normalize);
      }
      const priv = repos.filter(r => r.private).length;
      document.getElementById('subtitle').textContent = priv > 0
        ? `${repos.length} dépôts (dont ${priv} privés) · Liens, dates, infos clés`
        : `${repos.length} dépôts · Liens, dates, infos clés`;
      render();
    }

    function filterAndSort() {
      const q = (document.getElementById('search').value || '').toLowerCase().trim();
      const sortVal = document.getElementById('sort').value;
      let list = repos.filter(r => {
        if (!q) return true;
        const haystack = [
          r.name,
          r.desc || '',
          r.category || '',
          r.language || '',
          ...(r.topics || [])
        ].join(' ').toLowerCase();
        return haystack.includes(q);
      });

      const [field, dir] = sortVal.split('-');
      list.sort((a, b) => {
        let va, vb;
        if (field === 'created') {
          va = new Date(a.created || 0).getTime();
          vb = new Date(b.created || 0).getTime();
        } else if (field === 'name') {
          va = (a.name || '').toLowerCase();
          vb = (b.name || '').toLowerCase();
        } else if (field === 'stars') {
          va = a.stars ?? 0;
          vb = b.stars ?? 0;
        }
        if (dir === 'desc') [va, vb] = [vb, va];
        return va < vb ? -1 : va > vb ? 1 : 0;
      });

      const byCategory = {};
      for (const r of list) {
        const cat = r.category || 'Divers';
        if (!byCategory[cat]) byCategory[cat] = [];
        byCategory[cat].push(r);
      }
      return byCategory;
    }

    function render() {
      const byCategory = filterAndSort();
      const content = document.getElementById('content');
      const total = Object.values(byCategory).reduce((s, arr) => s + arr.length, 0);
      document.getElementById('count').textContent = `${total} / ${repos.length}`;

      if (total === 0) {
        content.innerHTML = '<div class="empty-state">Aucun repo ne correspond à la recherche.</div>';
        return;
      }

      let html = '';
      const orderedCats = [...CATEGORIES_ORDER];
      const extraCats = Object.keys(byCategory).filter(c => !CATEGORIES_ORDER.includes(c));
      for (const c of extraCats) orderedCats.push(c);
      const catsToShow = orderedCats.filter(c => byCategory[c] && byCategory[c].length > 0);
      for (const cat of catsToShow) {
        const list = byCategory[cat];
        html += `
          <section class="category-section">
            <h2 class="category-title">
              <span class="category-badge">${list.length}</span>${cat}
            </h2>
            <div class="grid">
              ${list.map(r => `
                <article class="card">
                  <h3 class="card-title">
                    <a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
                    ${r.private ? '<span class="badge badge-private">privé</span>' : ''}
                    ${r.fork ? '<span class="badge badge-fork">fork</span>' : ''}
                  </h3>
                  <div class="card-meta">
                    <span title="Créé le">📅 ${formatDate(r.created)}</span>
                    ${r.language ? `<span class="badge badge-lang">${r.language}</span>` : ''}
                    ${r.stars > 0 ? `<span>⭐ ${r.stars}</span>` : ''}
                  </div>
                  <p class="card-desc">${r.desc || '—'}</p>
                  <div class="card-edit"><a data-edit="${r.name}">✎ Modifier description / catégorie</a></div>
                </article>
              `).join('')}
            </div>
          </section>
        `;
      }
      content.innerHTML = html;

      content.querySelectorAll('[data-edit]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const name = el.getAttribute('data-edit');
          const r = repos.find(x => x.name === name);
          if (!r) return;
          showEditModal(name, r.desc || '', r.category || 'Divers');
        });
      });
    }

    function showEditModal(name, currentDesc, currentCat) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h4>Modifier : ${name}</h4>
          <label>Description</label>
          <textarea id="editDesc">${escapeHtml(currentDesc)}</textarea>
          <label>Catégorie</label>
          <select id="editCat">
            ${CATEGORIES_ORDER.map(c => `<option value="${escapeHtml(c)}" ${c === currentCat ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
          </select>
          <div class="modal-actions">
            <button type="button" class="refresh-btn" id="editCancel">Annuler</button>
            <button type="button" class="refresh-btn" id="editSave">Enregistrer</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      const close = () => { overlay.remove(); };
      overlay.querySelector('#editCancel').onclick = close;
      overlay.querySelector('#editSave').onclick = () => {
        const desc = overlay.querySelector('#editDesc').value.trim() || null;
        const cat = overlay.querySelector('#editCat').value || null;
        setOverride(name, desc, cat);
        const idx = repos.findIndex(x => x.name === name);
        if (idx >= 0) {
          repos[idx].desc = desc;
          repos[idx].category = cat;
        }
        close();
        render();
      };
      overlay.onclick = (e) => { if (e.target === overlay) overlay.querySelector('#editCancel').click(); };
    }
    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    document.getElementById('token').value = getStoredToken();
    document.getElementById('saveToken').addEventListener('click', () => {
      const tok = document.getElementById('token').value.trim();
      try { localStorage.setItem(TOKEN_KEY, tok); } catch (_) {}
      fetchRepos();
    });
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);
    document.getElementById('refresh').addEventListener('click', () => {
      const btn = document.getElementById('refresh');
      btn.disabled = true;
      btn.textContent = 'Chargement…';
      fetchRepos().then(() => {
        btn.disabled = false;
        btn.textContent = 'Rafraîchir';
      });
    });

    fetchRepos();
  </script>
</body>
</html>
