      {"name":"you_are_the_hero","desc":null,"url":"https://github.com/nmarchand73/you_are_the_hero","created":"2025-08-15T16:00:41Z","updated":"2025-08-30T21:16:24Z","language":"Python","stars":0,"topics":[],"fork":false}
    ];

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function normalize(r) {
      const name = r.name;
      const desc = r.description || REPO_DESCRIPTIONS[name] || null;
      const category = REPO_CATEGORY[name] || 'Divers';
      const hasPages = r.has_pages ?? REPO_HAS_PAGES.includes(name);
      return {
        name,
        desc,
        category,
        url: r.html_url || r.url,
        created: r.created_at || r.created,
        updated: r.pushed_at || r.updated_at || r.updated,
        language: r.language,
        stars: r.stargazers_count ?? r.stars ?? 0,
        topics: r.topics || [],
        fork: r.fork ?? false,
        private: r.private ?? false,
        hasPages,
        commits: r.commits ?? null
      };
    }

    function authHeaders() {
      const t = ghToken || document.getElementById('gh-token')?.value?.trim();
      if (!t) return {};
      return { 'Authorization': `Bearer ${t}` };
    }

    async function fetchCommitCounts() {
      const headers = { 'Content-Type': 'application/json', ...authHeaders() };
      const useViewer = !!headers['Authorization'];
      const query = useViewer
        ? `query { viewer { repositories(first: 100) { nodes { name defaultBranchRef { target { ... on Commit { history { totalCount } } } } } } } }`
        : `query { user(login: "${GITHUB_USER}") { repositories(first: 100) { nodes { name defaultBranchRef { target { ... on Commit { history { totalCount } } } } } } } }`;
      try {
        const res = await fetch('https://api.github.com/graphql', {
          method: 'POST',
          headers,
          body: JSON.stringify({ query })
        });
        if (!res.ok) return {};
        const json = await res.json();
        const root = useViewer ? json?.data?.viewer : json?.data?.user;
        const nodes = root?.repositories?.nodes ?? [];
        const map = {};
        for (const n of nodes) {
          const count = n?.defaultBranchRef?.target?.history?.totalCount ?? 0;
          map[n.name] = count;
        }
        return map;
      } catch (_) { return {}; }
    }

    async function fetchRepos() {
      const token = ghToken || document.getElementById('gh-token')?.value?.trim();
      const useAuth = !!token;
      const restUrl = useAuth
        ? 'https://api.github.com/user/repos?per_page=100&visibility=all'
        : `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100`;
      const headers = { ...authHeaders() };

      try {
        const [restRes, commitMap] = await Promise.all([
          fetch(restUrl, { headers }),
          fetchCommitCounts()
        ]);
        if (!restRes.ok) throw new Error(restRes.status);
        const data = await restRes.json();
        const owner = data[0]?.owner?.login || GITHUB_USER;
        document.querySelector('h1').textContent = `Repos GitHub · ${owner}`;
        repos = data.map(r => {
          const norm = normalize(r);
          norm.commits = commitMap[r.name] ?? null;
          return norm;
        });
      } catch (_) {
        repos = FALLBACK_REPOS.map(normalize);
      }
      render();
    }

    function filterAndSort() {
      const q = (document.getElementById('search').value || '').toLowerCase().trim();
      const sortVal = document.getElementById('sort').value;
      let list = repos.filter(r => {
        if (!q) return true;
        const haystack = [
          r.name,
          r.desc || '',
          r.category || '',
          r.language || '',
          r.private ? 'privé' : '',
          ...(r.topics || [])
        ].join(' ').toLowerCase();
        return haystack.includes(q);
      });

      const [field, dir] = sortVal.split('-');
      list.sort((a, b) => {
        let va, vb;
        if (field === 'created') {
          va = new Date(a.created || 0).getTime();
          vb = new Date(b.created || 0).getTime();
        } else if (field === 'updated') {
          va = new Date(a.updated || 0).getTime();
          vb = new Date(b.updated || 0).getTime();
        } else if (field === 'commits') {
          va = a.commits ?? -1;
          vb = b.commits ?? -1;
        } else if (field === 'name') {
          va = (a.name || '').toLowerCase();
          vb = (b.name || '').toLowerCase();
        } else if (field === 'stars') {
          va = a.stars ?? 0;
          vb = b.stars ?? 0;
        }
        if (dir === 'desc') [va, vb] = [vb, va];
        return va < vb ? -1 : va > vb ? 1 : 0;
      });

      const byCategory = {};
      for (const r of list) {
        const cat = r.category || 'Divers';
        if (!byCategory[cat]) byCategory[cat] = [];
        byCategory[cat].push(r);
      }
      return byCategory;
    }

    function render() {
      const byCategory = filterAndSort();
      const content = document.getElementById('content');
      const total = Object.values(byCategory).reduce((s, arr) => s + arr.length, 0);
      document.getElementById('count').textContent = `${total} / ${repos.length}`;
      document.getElementById('subtitle').textContent = `${repos.length} dépôts · Liens, dates, infos clés`;

      if (total === 0) {
        content.innerHTML = '<div class="empty-state">Aucun repo ne correspond à la recherche.</div>';
        return;
      }

      let html = '';
      const orderedCats = [...CATEGORIES_ORDER];
      const extraCats = Object.keys(byCategory).filter(c => !CATEGORIES_ORDER.includes(c));
      for (const c of extraCats) orderedCats.push(c);
      const catsToShow = orderedCats.filter(c => byCategory[c] && byCategory[c].length > 0);
      for (const cat of catsToShow) {
        const list = byCategory[cat];
        html += `
          <section class="category-section">
            <h2 class="category-title">
              <span class="category-badge">${list.length}</span>${cat}
            </h2>
            <div class="grid">
              ${list.map(r => `
                <article class="card">
                  <div class="card-header">
                    <h3 class="card-title">
                      <a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
                    </h3>
                    ${(r.fork || r.private || r.language || r.stars > 0) ? `
                    <div class="card-badges">
                      ${r.private ? '<span class="badge badge-private">privé</span>' : ''}
                      ${r.fork ? '<span class="badge badge-fork">fork</span>' : ''}
                      ${r.language ? `<span class="badge badge-lang">${r.language}</span>` : ''}
                      ${r.stars > 0 ? `<span class="badge badge-stars">⭐ ${r.stars}</span>` : ''}
                    </div>
                    ` : ''}
                  </div>
                  <div class="card-stats">
                    <div class="card-stat">
                      <span class="card-stat-label">Créé</span>
                      <span class="card-stat-value">${formatDate(r.created)}</span>
                    </div>
                    <div class="card-stat">
                      <span class="card-stat-label">Dernier commit</span>
                      <span class="card-stat-value">${formatDate(r.updated)}</span>
                    </div>
                    ${r.commits != null ? `
                    <div class="card-stat">
                      <span class="card-stat-label">Commits</span>
                      <span class="card-stat-value">${r.commits}</span>
                    </div>
                    ` : ''}
                  </div>
                  ${r.hasPages ? `<div class="card-links"><a href="https://${GITHUB_USER}.github.io/${r.name}/" target="_blank" rel="noopener">🌐 Page publiée</a></div>` : ''}
                  <p class="card-desc">${r.desc || '—'}</p>
                </article>
              `).join('')}
            </div>
          </section>
        `;
      }
      content.innerHTML = html;
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);
    document.getElementById('refresh').addEventListener('click', () => {
      const btn = document.getElementById('refresh');
      btn.disabled = true;
      btn.textContent = 'Chargement…';
      fetchRepos().then(() => {
        btn.disabled = false;
        btn.textContent = 'Rafraîchir';
      });
    });

    document.getElementById('auth-btn').addEventListener('click', () => {
      const input = document.getElementById('gh-token');
      const token = input?.value?.trim();
      if (!token) return;
      const remember = document.getElementById('auth-remember')?.checked;
      ghToken = token;
      if (remember) localStorage.setItem(TOKEN_KEY, token);
      else localStorage.removeItem(TOKEN_KEY);
      input.value = '';
      input.placeholder = 'Token actif';
      document.getElementById('auth-clear').style.display = 'inline-block';
      const btn = document.getElementById('auth-btn');
      btn.disabled = true;
      btn.textContent = 'Chargement…';
      fetchRepos().then(() => {
        btn.disabled = false;
        btn.textContent = 'Charger avec token';
      });
    });

    if (ghToken) {
      document.getElementById('gh-token').placeholder = 'Token actif';
      document.getElementById('auth-clear').style.display = 'inline-block';
    }
    document.getElementById('auth-clear').addEventListener('click', () => {
      ghToken = '';
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('gh-token').placeholder = 'ghp_xxxx...';
      document.getElementById('auth-clear').style.display = 'none';
      document.querySelector('h1').textContent = 'Repos GitHub · ' + GITHUB_USER;
      fetchRepos();
    });
    fetchRepos();
  </script>
</body>
</html>
